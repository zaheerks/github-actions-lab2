name: Installing Python
 
on: [push]

jobs:
  build:
   runs-on: '${{ matrix.os }}'
   strategy:
     matrix:
       os: 
         - ubuntu-latest
         - macos-14
         - windows-latest]
       
         - 3.10 
         - 3.11 
         - 3.12
      exclude:
      - py-version: 3.12
        os: macos-14
   steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '${{ matrix.py-version }}'
        
